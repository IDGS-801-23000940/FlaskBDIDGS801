{% extends "layout.html" %} {% block container %}

<section class="bg-neutral-primary">
  <br />

  <a
    href="{{ url_for('alumnos.agregar_alumno') }}"
    class="inline-flex items-center gap-2 text-white bg-emerald-600 hover:bg-emerald-700 focus:ring-4 focus:ring-emerald-300 shadow-md font-medium rounded-lg text-sm px-6 py-2.5 transition-all duration-200 focus:outline-none"
  >
    Agregar
  </a>

  <div class="py-8 px-4 mx-auto max-w-screen-xl text-center lg:py-4 lg:px-1">
    <div
      class="relative overflow-x-auto bg-neutral-primary-soft shadow-xs rounded-base border border-default"
    >
      <table class="w-full text-sm text-left rtl:text-right text-body">
        <thead class="bg-neutral-secondary-soft border-b border-default">
          <tr>
            <th class="px-6 py-3">Nombre</th>
            <th class="px-6 py-3">Apellidos</th>
            <th class="px-6 py-3">Email</th>
            <th class="px-6 py-3">Telefono</th>
            <th class="px-6 py-3">Detalles</th>
            <th class="px-6 py-3">Actualizar</th>
            <th class="px-6 py-3">Eliminar</th>
          </tr>
        </thead>

        <tbody>
          {% for alum in alumnos %}

          <tr
            class="odd:bg-neutral-primary even:bg-neutral-secondary-soft border-b border-default"
          >
            <td class="px-6 py-4">{{ alum.nombre }}</td>
            <td class="px-6 py-4">{{ alum.apellidos }}</td>
            <td class="px-6 py-4">{{ alum.email }}</td>
            <td class="px-6 py-4">{{ alum.telefono }}</td>

            <td class="px-6 py-4">
              <a
                href="{{ url_for('alumnos.detalles', id=alum.id) }}"
                class="inline-flex items-center gap-2 px-3 py-2 text-sm font-medium text-blue-600 bg-blue-50 rounded-lg hover:bg-blue-100"
              >
                Detalles
              </a>
            </td>

            <td class="px-6 py-4">
              <a
                href="{{ url_for('alumnos.modificar', id=alum.id) }}"
                class="inline-flex items-center gap-2 px-3 py-2 text-sm font-medium text-amber-600 bg-amber-50 rounded-lg hover:bg-amber-100"
              >
                Actualizar
              </a>
            </td>

            <td class="px-6 py-4">
              <a
                href="{{ url_for('alumnos.eliminar', id=alum.id) }}"
                class="inline-flex items-center gap-2 px-3 py-2 text-sm font-medium text-red-600 bg-red-50 rounded-lg hover:bg-red-100"
              >
                Eliminar
              </a>
            </td>
          </tr>

          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
</section>

{% endblock %}
